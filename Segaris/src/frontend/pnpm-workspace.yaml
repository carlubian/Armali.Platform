# Frontend pnpm settings.
#
# pnpm 10+ reads project-wide settings from this file rather than `.npmrc`
# (which it now treats as npm-registry/auth only). These mirror the foundation
# decisions in docs/planning/FRONTEND_FOUNDATION_DECISIONS.md: dependency
# versions are pinned exactly and the pinned Node engine is enforced.
saveExact: true
engineStrict: true
