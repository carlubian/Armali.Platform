name: Segaris Publish Images

on:
  workflow_run:
    workflows:
      - Segaris Foundation Validation
    branches:
      - main
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: segaris-publish-images-${{ github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish Segaris ${{ matrix.image.name }}
    if: >-
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.event == 'push' &&
       github.event.workflow_run.conclusion == 'success') ||
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: segaris-production-images
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: backend
            repository: segaris-backend
            context: Segaris
            dockerfile: Segaris/src/backend/Segaris.Api/Dockerfile
          - name: frontend
            repository: segaris-frontend
            context: Segaris/deploy/frontend-placeholder
            dockerfile: Segaris/deploy/frontend-placeholder/Dockerfile
          - name: caddy
            repository: segaris-caddy
            context: Segaris/deploy/caddy
            dockerfile: Segaris/deploy/caddy/Dockerfile

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          persist-credentials: false

      - name: Sign in to Azure with OIDC
        uses: azure/login@v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Sign in to Azure Container Registry
        run: az acr login --name "${{ vars.ACR_NAME }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push immutable image
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          push: true
          tags: ${{ vars.ACR_LOGIN_SERVER }}/${{ matrix.image.repository }}:${{ github.event.workflow_run.head_sha || github.sha }}
          cache-from: type=gha,scope=segaris-${{ matrix.image.name }}
          cache-to: type=gha,mode=max,scope=segaris-${{ matrix.image.name }}
          provenance: true
          sbom: true
