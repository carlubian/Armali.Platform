name: Segaris Foundation Validation

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    paths:
      - 'Segaris/**'
      - '.github/workflows/segaris-validation.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: segaris-validation-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  changes:
    name: Detect Segaris changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      segaris: ${{ steps.filter.outputs.segaris }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            segaris:
              - 'Segaris/**'
              - '.github/workflows/segaris-validation.yml'

  backend:
    name: Segaris Backend
    needs: changes
    if: ${{ github.event_name != 'pull_request' || needs.changes.outputs.segaris == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: Segaris/global.json

      - name: Restore
        shell: pwsh
        run: ./Segaris/scripts/backend-restore.ps1

      - name: Verify formatting
        shell: pwsh
        run: ./Segaris/scripts/backend-format.ps1 -Verify

      - name: Build
        shell: pwsh
        run: ./Segaris/scripts/backend-build.ps1

      - name: Run unit tests
        run: dotnet test Segaris/tests/backend/Segaris.UnitTests/Segaris.UnitTests.csproj --no-restore --no-build

      - name: Run architecture tests
        run: dotnet test Segaris/tests/backend/Segaris.ArchitectureTests/Segaris.ArchitectureTests.csproj --no-restore --no-build

  backend-integration:
    name: Segaris Backend Integration (shard ${{ matrix.shard }}/${{ strategy.job-total }})
    needs: changes
    if: ${{ github.event_name != 'pull_request' || needs.changes.outputs.segaris == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: Segaris/global.json

      - name: Restore
        shell: pwsh
        run: ./Segaris/scripts/backend-restore.ps1

      - name: Build
        shell: pwsh
        run: ./Segaris/scripts/backend-build.ps1

      - name: Run API integration tests (shard ${{ matrix.shard }})
        shell: pwsh
        run: >-
          ./Segaris/scripts/backend-test-shard.ps1
          -Project tests/backend/Segaris.Api.IntegrationTests/Segaris.Api.IntegrationTests.csproj
          -ShardIndex ${{ matrix.shard }}
          -ShardCount ${{ strategy.job-total }}

  frontend:
    name: Segaris Frontend
    needs: changes
    if: ${{ github.event_name != 'pull_request' || needs.changes.outputs.segaris == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24.16.0

      - name: Enable Corepack
        run: corepack enable

      - name: Restore
        shell: pwsh
        run: ./Segaris/scripts/frontend-restore.ps1

      - name: Lint
        shell: pwsh
        run: ./Segaris/scripts/frontend-lint.ps1

      - name: Verify formatting
        shell: pwsh
        run: ./Segaris/scripts/frontend-format.ps1 -Verify

      - name: Type-check and build
        shell: pwsh
        run: ./Segaris/scripts/frontend-build.ps1

      - name: Run unit and component tests
        shell: pwsh
        run: ./Segaris/scripts/frontend-test.ps1

  postgres:
    name: Segaris PostgreSQL
    needs: changes
    if: ${{ github.event_name != 'pull_request' || needs.changes.outputs.segaris == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: Segaris/global.json

      - name: Install PostgreSQL 17 client
        run: |
          sudo install -d /usr/share/postgresql-common/pgdg
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            | sudo tee /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc > /dev/null
          . /etc/os-release
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt ${VERSION_CODENAME}-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list > /dev/null
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends postgresql-client-17
          pg_dump --version

      - name: Restore
        shell: pwsh
        run: ./Segaris/scripts/backend-restore.ps1

      - name: Build
        shell: pwsh
        run: ./Segaris/scripts/backend-build.ps1

      - name: Run PostgreSQL integration tests
        run: dotnet test Segaris/tests/backend/Segaris.Postgres.IntegrationTests/Segaris.Postgres.IntegrationTests.csproj --no-restore --no-build

      - name: Run migration tests
        run: dotnet test Segaris/tests/backend/Segaris.Migrations.IntegrationTests/Segaris.Migrations.IntegrationTests.csproj --no-restore --no-build

  compose:
    name: Segaris Compose
    needs: changes
    if: ${{ github.event_name != 'pull_request' || needs.changes.outputs.segaris == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run Compose smoke test
        run: ./Segaris/scripts/compose-smoke-test.sh
