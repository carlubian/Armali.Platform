# Blackwing production-oriented Compose stack.
#
# This base topology references images by tag and never builds. It is used for
# both full local container execution and production deployment:
#
#   * Local full stack:  layer docker-compose.local.yml to build the images
#                        (see scripts/compose-up.ps1).
#   * Production:        supply the BLACKWING_*_IMAGE tags (immutable commit-SHA
#                        tags from the private registry / ACR) and the required
#                        secrets as stack environment variables.
#
# Secrets (database password, initial administrator) are injected as environment
# variables and never committed. See deploy/compose/.env.example.
name: blackwing
services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: ${BLACKWING_POSTGRES_DB:-blackwing}
      POSTGRES_USER: ${BLACKWING_POSTGRES_USER:-blackwing}
      POSTGRES_PASSWORD: ${BLACKWING_POSTGRES_PASSWORD:?BLACKWING_POSTGRES_PASSWORD is required}
    volumes: [postgres-data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12
  backend:
    image: ${BLACKWING_BACKEND_IMAGE:-blackwing-backend:local}
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Blackwing: Host=postgres;Port=5432;Database=${BLACKWING_POSTGRES_DB:-blackwing};Username=${BLACKWING_POSTGRES_USER:-blackwing};Password=${BLACKWING_POSTGRES_PASSWORD:?BLACKWING_POSTGRES_PASSWORD is required}
      Blackwing__Storage__ImagesPath: /data/images
      Blackwing__Storage__StagingPath: /data/staging
      InitialAdmin__Username: ${BLACKWING_INITIAL_ADMIN_USERNAME:-admin}
      InitialAdmin__Password: ${BLACKWING_INITIAL_ADMIN_PASSWORD:?BLACKWING_INITIAL_ADMIN_PASSWORD is required}
    volumes: [image-data:/data]
    depends_on: { postgres: { condition: service_healthy } }
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 12
  frontend:
    image: ${BLACKWING_FRONTEND_IMAGE:-blackwing-frontend:local}
    depends_on: { backend: { condition: service_healthy } }
    ports: ["${BLACKWING_HTTP_PORT:-5055}:80"]
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 10s
      timeout: 5s
      retries: 6
volumes:
  postgres-data:
  image-data:
